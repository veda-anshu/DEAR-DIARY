<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nibGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" /> <!-- Teal -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet -->
    </linearGradient>
  </defs>
  
  <!-- Dark Slate Background -->
  <rect width="100" height="100" rx="24" fill="#0f172a" />
  
  <g fill="none" stroke="url(#nibGlow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Nib Outline -->
    <path d="M 50 15 
             L 25 50 
             L 35 80 
             Q 50 85 65 80 
             L 75 50 
             Z" />
    
    <!-- Breather Hole -->
    <circle cx="50" cy="58" r="4" />
    
    <!-- Slit (Line down the middle) -->
    <line x1="50" y1="18" x2="50" y2="54" />
    
    <!-- Decorative Engraving Line -->
    <path d="M 31 65 Q 50 75 69 65" />
  </g>
</svg>
